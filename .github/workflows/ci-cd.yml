name: CI/CD Pipeline Frontend

on:
  push:
    branches: [ "main" ] # Tu repositorio frontend usa la rama main [1]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Versión recomendada para proyectos con Vite/Vue

      - name: Instalar dependencias
        run: npm install # Valida y descarga las dependencias del package.json [1]

      - name: Ejecutar pruebas unitarias
        # Este paso cumple con el requisito de automatizar las pruebas del frontend [3, 4]
        run: npm run test

      - name: Compilar (Build) del Frontend
        # Empaqueta la aplicación para producción generando los archivos estáticos
        run: npm run build

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Cambia "tu-usuario-dockerhub" por tu usuario real
          tags: tu-usuario-dockerhub/frontend-service:latest 